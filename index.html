<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Método Ribeiro PRO ULTRA MAX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
.container{max-width:1200px;margin:auto;background:#111827;padding:20px;border-radius:12px}
h1{color:#a78bfa}
h2{margin-top:20px;color:#c4b5fd}
input, select, textarea{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
button{margin-top:10px;background:#7c3aed;color:#fff;padding:10px;border:none;border-radius:8px;cursor:pointer}
.result{margin-top:15px;background:#1f2937;padding:10px;border-radius:8px}
canvas{background:#fff;border-radius:8px;margin-top:15px}
</style>
</head>
<body>
<div class="container">

<div style="display:flex;align-items:center;gap:10px;">
<img src="logo.png" style="height:60px">
<h1>Método Ribeiro PRO ULTRA MAX</h1>
</div>

<h2>Cadastro</h2>
<input id="nome" placeholder="Nome completo">
<input id="nascimento" type="date">
<input id="telefone" placeholder="Telefone / WhatsApp">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">
<select id="sexoCadastro">
<option value="M">Masculino</option>
<option value="F">Feminino</option>
</select>

<h2>Anamnese</h2>
<select id="objetivo">
<option>Emagrecer</option>
<option>Hipertrofia</option>
<option>Condicionamento</option>
<option>Saúde e Bem-estar</option>
</select>
<select id="nivelDor">
<option>Sem dor</option>
<option>Leve</option>
<option>Moderada</option>
<option>Alta</option>
</select>
<textarea id="lesoes" placeholder="Histórico de lesões"></textarea>
<textarea id="medicamentos" placeholder="Uso de medicamentos"></textarea>
<input id="frequencia" placeholder="Frequência semanal de treino">
<input id="tempoPratica" placeholder="Há quanto tempo pratica atividade física">

<h2>Avaliação Postural (Fotos)</h2>
<input type="file" accept="image/*" onchange="preview(this,'fotoFrente')">
<img id="fotoFrente" class="preview">
<input type="file" accept="image/*" onchange="preview(this,'fotoLado')">
<img id="fotoLado" class="preview">
<input type="file" accept="image/*" onchange="preview(this,'fotoCostas')">
<img id="fotoCostas" class="preview">

<h2>Dados</h2>
<input id="peso" placeholder="Peso (kg)">
<input id="altura" placeholder="Altura (m)">
<input id="idade" placeholder="Idade">
<select id="sexo"><option value="M">Masculino</option><option value="F">Feminino</option></select>

<h2>Circunferências</h2>
<input id="pantD" placeholder="Panturrilha Direita">
<input id="pantE" placeholder="Panturrilha Esquerda">
<input id="coxaD" placeholder="Coxa Direita">
<input id="coxaE" placeholder="Coxa Esquerda">
<input id="quadril" placeholder="Quadril">
<input id="abd" placeholder="Abdômen">
<input id="cintura" placeholder="Cintura">
<input id="torax" placeholder="Tórax">
<input id="ombros" placeholder="Ombros">
<input id="pescoco" placeholder="Pescoço">
<input id="anteD" placeholder="Antebraço Direito">
<input id="anteE" placeholder="Antebraço Esquerdo">
<input id="bracoD" placeholder="Braço Direito">
<input id="bracoE" placeholder="Braço Esquerdo">

<h2>Dobras Cutâneas</h2>
<input id="triceps" placeholder="Tríceps">
<input id="biceps" placeholder="Bíceps">
<input id="subescapular" placeholder="Subescapular">
<input id="supra" placeholder="Supra-ilíaca">
<input id="peitoral" placeholder="Peitoral">
<input id="axilar" placeholder="Axilar">
<input id="abdomen" placeholder="Abdômen">
<input id="coxa" placeholder="Coxa">
<input id="pant" placeholder="Panturrilha">

<h2>Diâmetros Ósseos</h2>
<input id="femur" placeholder="Fêmur">
<input id="punho" placeholder="Punho">
<input id="umero" placeholder="Úmero">
<input id="tornozelo" placeholder="Tornozelo">

<button onclick="calcular()">Calcular Completo</button>
<button onclick="window.print()">Imprimir / PDF</button>

<div id="resultado" class="result"></div>
<canvas id="grafico"></canvas>
</div>

<script>
let hist = JSON.parse(localStorage.getItem('hist')||'[]');
function v(id){return parseFloat(document.getElementById(id).value)||0}

function calcular(){
let peso=v('peso'),altura=v('altura'),idade=v('idade');
let sexo=document.getElementById('sexo').value;

let imc = peso/(altura*altura);
let rcq = v('cintura')/v('quadril');

// JP7
let soma=v('triceps')+v('subescapular')+v('supra')+v('peitoral')+v('axilar')+v('abdomen')+v('coxa');
let dens= sexo==='M'
?1.112-(0.00043499*soma)+(0.00000055*soma*soma)-(0.00028826*idade)
:1.097-(0.00046971*soma)+(0.00000056*soma*soma)-(0.00012828*idade);
let gordura=(495/dens)-450;

// Deurenberg
let gordura2=1.20*imc+0.23*idade-(sexo==='M'?16.2:5.4);

// Durnin simplificado
let gordura3=gordura*0.95;

// Pesos corporais
let pesoGordura = peso*(gordura/100);
let pesoMagro = peso - pesoGordura;
let pesoOsseo = peso*0.15;
let pesoResidual = peso*0.10;

// Somatotipo
let endo = -0.7182 + 0.1451*(v('triceps')+v('subescapular')+v('supra'));
let meso = (0.858*v('umero'))+(0.601*v('femur'))+(0.188*v('bracoD'))+(0.161*v('pantD'))-0.131*(altura*100)+4.5;
let hwr=(altura*100)/Math.cbrt(peso);
let ecto = hwr>40?0.732*hwr-28.58:0.1;

hist.push(gordura);
localStorage.setItem('hist',JSON.stringify(hist));

let ideal = idade<30?10:idade<50?15:20;

let res=`
IMC: ${imc.toFixed(2)}
RCQ: ${rcq.toFixed(2)}
% Gordura JP7: ${gordura.toFixed(2)}
Deurenberg: ${gordura2.toFixed(2)}
Durnin: ${gordura3.toFixed(2)}
Faixa ideal: ${ideal}%
Peso gordura: ${pesoGordura.toFixed(2)}kg
Peso magro: ${pesoMagro.toFixed(2)}kg
Peso ósseo: ${pesoOsseo.toFixed(2)}kg
Residual: ${pesoResidual.toFixed(2)}kg
Somatotipo:
Endo ${endo.toFixed(2)}
Meso ${meso.toFixed(2)}
Ecto ${ecto.toFixed(2)}
`;


document.getElementById('resultado').innerText=res;

new Chart(document.getElementById('grafico'),{
 type:'line',
 data:{labels:hist.map((_,i)=>i+1),datasets:[{label:'% Gordura',data:hist}]}
});
}
</script>
</body>
</html>
