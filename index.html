<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Método Ribeiro Elite CLÍNICO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:#fff}
.container{max-width:520px;margin:auto;padding:15px}
.step{display:none}
.step.active{display:block}
.card{background:#111827;padding:15px;border-radius:12px;margin-bottom:10px}
input,select,textarea{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;background:#1f2937;color:#fff}
button{width:100%;padding:12px;border:none;border-radius:10px;margin-top:10px;background:#7c3aed;color:#fff}
.progress{height:5px;background:#222;border-radius:10px;margin-bottom:10px}
.bar{height:5px;background:#7c3aed;width:0%}
</style>
</head>

<body>

<div class="container">

<div class="progress"><div id="bar" class="bar"></div></div>

<!-- HOME -->
<div class="step active">
<div class="card" style="height:70vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:url('https://img.freepik.com/fotos-gratis/mulher-ajudando-homem-na-academia_30893602.jpg') center/cover">
<h2 style="background:rgba(0,0,0,0.6);padding:10px;border-radius:10px">Método Ribeiro</h2>
<button onclick="start()">Iniciar Avaliação</button>
</div>
</div>

<!-- CADASTRO -->
<div class="step">
<div class="card">
<h3>Cadastro</h3>
<input id="nome" placeholder="Nome">
<input id="idade" placeholder="Idade">
<input id="peso" placeholder="Peso">
<input id="altura" placeholder="Altura">
<select id="sexo"><option value="M">Masculino</option><option value="F">Feminino</option></select>
</div>
<button onclick="next()">Próximo</button>
</div>

<!-- ANAMNESE -->
<div class="step">
<div class="card">
<h3>Anamnese Completa</h3>

<select><option>Objetivo: Emagrecer</option><option>Hipertrofia</option><option>Saúde</option></select>
<select><option>Dor: Nenhuma</option><option>Leve</option><option>Moderada</option><option>Alta</option></select>

<textarea placeholder="1. Histórico de doenças"></textarea>
<textarea placeholder="2. Lesões"></textarea>
<textarea placeholder="3. Medicamentos"></textarea>
<textarea placeholder="4. Cirurgias"></textarea>
<textarea placeholder="5. Histórico familiar"></textarea>

<select>
<option>6. Frequência treino 1x</option>
<option>2x</option><option>3x</option><option>4x</option><option>5x</option><option>6x</option><option>7x</option>
</select>

<select>
<option>7. Nível iniciante</option>
<option>Intermediário</option>
<option>Avançado</option>
</select>

<textarea placeholder="8. Objetivo detalhado"></textarea>
<textarea placeholder="9. Limitações"></textarea>
<textarea placeholder="10. Observações gerais"></textarea>

</div>
<button onclick="next()">Próximo</button>
</div>

<!-- POSTURAL -->
<div class="step">
<div class="card">
<h3>Avaliação Postural (até 5 fotos)</h3>

<input type="file">
<input type="file">
<input type="file">
<input type="file">
<input type="file">

<select id="cabeca"><option>Alinhada</option><option>Desvio</option></select>
<select id="ombro"><option>Alinhado</option><option>Desnível</option></select>
<select id="coluna"><option>Normal</option><option>Alterada</option></select>

<button onclick="laudoPostural()">Gerar Laudo</button>
<div id="laudo"></div>

</div>
<button onclick="next()">Próximo</button>
</div>

<!-- CIRCUNFERÊNCIAS -->
<div class="step">
<div class="card">
<h3>Circunferências</h3>

<input id="cintura" placeholder="Cintura">
<input id="quadril" placeholder="Quadril">
<input placeholder="Peitoral">
<input placeholder="Ombros">
<input placeholder="Pescoço">

<input id="pantD" placeholder="Panturrilha D">
<input placeholder="Panturrilha E">
<input id="coxa" placeholder="Coxa">
<input placeholder="Coxa E">

<input id="braco" placeholder="Braço D">
<input placeholder="Braço E">

<input placeholder="Antebraço D">
<input placeholder="Antebraço E">

</div>
<button onclick="next()">Próximo</button>
</div>

<!-- DOBRAS -->
<div class="step">
<div class="card">
<h3>Dobras Cutâneas</h3>

<input id="triceps" placeholder="Tríceps">
<input placeholder="Bíceps">
<input id="subescapular" placeholder="Subescapular">
<input id="supra" placeholder="Supra-ilíaca">
<input placeholder="Peitoral">
<input placeholder="Axilar">
<input id="abdomen" placeholder="Abdômen">
<input id="coxaD" placeholder="Coxa">
<input placeholder="Panturrilha">

</div>
<button onclick="next()">Próximo</button>
</div>

<!-- DIÂMETROS -->
<div class="step">
<div class="card">
<h3>Diâmetros Ósseos</h3>

<input id="femur" placeholder="Fêmur">
<input id="umero" placeholder="Úmero">
<input placeholder="Punho">
<input placeholder="Tornozelo">

</div>
<button onclick="calc()">Finalizar</button>
</div>

<!-- RESULTADO -->
<div class="step">
<div class="card">
<h3>Resultado</h3>
<div id="res"></div>
<canvas id="grafico"></canvas>
</div>
</div>

</div>

<script>

let step=0
const bar=document.getElementById('bar')

function show(){
 let steps=document.querySelectorAll('.step')
 steps.forEach((e,i)=>e.classList.toggle('active',i===step))
 bar.style.width=(step/(steps.length-1))*100+'%'
}

function start(){
 step=1
 show()
}

function next(){
 let steps=document.querySelectorAll('.step')
 if(step<steps.length-1){step++;show()}
}

function calc(){

 let p=+peso.value
 let a=+altura.value
 let i=+idade.value

 let imc=p/(a*a)
 let rcq=(+cintura.value)/(+quadril.value)

 let soma=+triceps.value+ +subescapular.value+ +supra.value+ +abdomen.value+ +coxaD.value
 let dens=1.112-(0.00043499*soma)+(0.00000055*soma*soma)-(0.00028826*i)
 let gordura=(495/dens)-450

 let gorduraKg=p*(gordura/100)
 let massa=p-gorduraKg

 let pesoIdeal=massa/(1-0.18)

 res.innerText=
`IMC: ${imc.toFixed(2)}
RCQ: ${rcq.toFixed(2)}
Gordura: ${gordura.toFixed(2)}%
Peso ideal: ${pesoIdeal.toFixed(2)} kg`

 new Chart(grafico,{
 type:'bar',
 data:{labels:['Peso','Gordura','Massa Magra'],
 datasets:[{data:[p,gorduraKg,massa]}]}
 })

 next()
}

function laudoPostural(){
 let texto="Postura analisada:\n"
 if(cabeca.value!="Alinhada") texto+="Desvio de cabeça\n"
 if(ombro.value!="Alinhado") texto+="Desnível de ombros\n"
 if(coluna.value!="Normal") texto+="Alteração de coluna\n"

 texto+="Recomendação: treino corretivo"

 document.getElementById('laudo').innerText=texto
}

show()

</script>

</body>
</html>
