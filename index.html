<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Método Ribeiro PRO ULTRA MAX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
.container{max-width:1200px;margin:auto;background:#111827;padding:20px;border-radius:12px}
h1{color:#a78bfa}
h2{margin-top:20px;color:#c4b5fd}
input, select, textarea{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
button{margin-top:10px;background:#7c3aed;color:#fff;padding:10px;border:none;border-radius:8px;cursor:pointer}
.result{margin-top:15px;background:#1f2937;padding:10px;border-radius:8px;white-space:pre-line}
canvas{background:#fff;border-radius:8px;margin-top:15px}
.preview{max-width:100px;margin:5px;border-radius:8px}
</style>
</head>
<body>
<div class="container">

<div style="display:flex;align-items:center;gap:10px;">
<img src="logo.png" style="height:60px">
<h1>Método Ribeiro PRO ULTRA MAX</h1>
</div>

<h2>Cadastro</h2>
<input id="nome" placeholder="Nome completo">
<input id="nascimento" type="date">
<input id="telefone" placeholder="Telefone / WhatsApp">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">
<select id="sexoCadastro"><option value="M">Masculino</option><option value="F">Feminino</option></select>

<h2>Anamnese</h2>
<select id="objetivo">
<option>Emagrecer</option>
<option>Hipertrofia</option>
<option>Condicionamento</option>
<option>Saúde e Bem-estar</option>
</select>
<select id="nivelDor"><option>Sem dor</option><option>Leve</option><option>Moderada</option><option>Alta</option></select>
<textarea id="lesoes" placeholder="Histórico de lesões"></textarea>
<textarea id="medicamentos" placeholder="Uso de medicamentos"></textarea>
<input id="frequencia" placeholder="Frequência semanal">
<input id="tempoPratica" placeholder="Tempo de prática">

<h2>Avaliação Postural (Fotos)</h2>
<input type="file" accept="image/*" onchange="preview(this,'f1')"><img id="f1" class="preview">
<input type="file" accept="image/*" onchange="preview(this,'f2')"><img id="f2" class="preview">
<input type="file" accept="image/*" onchange="preview(this,'f3')"><img id="f3" class="preview">

<h2>Dados Corporais</h2>
<input id="peso" placeholder="Peso (kg)">
<input id="altura" placeholder="Altura (m)">
<input id="idade" placeholder="Idade (18 a 61)">
<select id="sexo"><option value="M">Masculino</option><option value="F">Feminino</option></select>

<h2>Circunferências</h2>
<input id="pantD" placeholder="Panturrilha Direita">
<input id="pantE" placeholder="Panturrilha Esquerda">
<input id="coxaD" placeholder="Coxa Direita">
<input id="coxaE" placeholder="Coxa Esquerda">
<input id="quadril" placeholder="Quadril">
<input id="abd" placeholder="Abdômen">
<input id="cintura" placeholder="Cintura">
<input id="torax" placeholder="Tórax">
<input id="ombros" placeholder="Ombros">
<input id="pescoco" placeholder="Pescoço">
<input id="anteD" placeholder="Antebraço Direito">
<input id="anteE" placeholder="Antebraço Esquerdo">
<input id="bracoD" placeholder="Braço Direito">
<input id="bracoE" placeholder="Braço Esquerdo">

<h2>Dobras Cutâneas (JP7 + extras)</h2>
<input id="triceps" placeholder="Tríceps">
<input id="biceps" placeholder="Bíceps">
<input id="subescapular" placeholder="Subescapular">
<input id="supra" placeholder="Supra-ilíaca">
<input id="peitoral" placeholder="Peitoral">
<input id="axilar" placeholder="Axilar">
<input id="abdomen" placeholder="Abdômen">
<input id="coxa" placeholder="Coxa">
<input id="pant" placeholder="Panturrilha">

<h2>Diâmetros Ósseos</h2>
<input id="femur" placeholder="Fêmur">
<input id="punho" placeholder="Punho">
<input id="umero" placeholder="Úmero">
<input id="tornozelo" placeholder="Tornozelo">

<button onclick="calcular()">Calcular Completo</button>
<button onclick="window.print()">Imprimir / PDF</button>

<div id="resultado" class="result"></div>
<canvas id="graficoLinha"></canvas>
<canvas id="graficoColuna"></canvas>
</div>

<script>
let hist = JSON.parse(localStorage.getItem('hist')||'[]');
function v(id){return parseFloat(document.getElementById(id).value)||0}
function preview(input,id){let r=new FileReader();r.onload=e=>document.getElementById(id).src=e.target.result;r.readAsDataURL(input.files[0]);}

function classIMC(imc){
 if(imc<18.5) return 'Abaixo do peso';
 if(imc<25) return 'Normal';
 if(imc<30) return 'Sobrepeso';
 if(imc<35) return 'Obesidade I';
 if(imc<40) return 'Obesidade II';
 return 'Obesidade III';
}

function classGordura(p,sexo){
 if(sexo==='M'){
  if(p<8) return 'Excelente'; if(p<15) return 'Bom'; if(p<20) return 'Médio'; if(p<25) return 'Regular'; return 'Ruim';
 }else{
  if(p<15) return 'Excelente'; if(p<22) return 'Bom'; if(p<28) return 'Médio'; if(p<33) return 'Regular'; return 'Ruim';
 }
}

function idealGordura(sexo,idade){
 if(sexo==='M') return idade<30?'10–15%':(idade<50?'12–18%':'14–22%');
 return idade<30?'18–25%':(idade<50?'20–28%':'22–32%');
}

// Peso ideal (Devine)
// Peso ideal baseado no percentual de gordura (JP7)
function pesoIdeal(peso, gorduraAtual, gorduraIdealMedia){
 let massaMagra = peso * (1 - gorduraAtual/100);
 let pesoIdealCalc = massaMagra / (1 - gorduraIdealMedia/100);
 return pesoIdealCalc;
}

function calcular(){
 let peso=v('peso'),altura=v('altura'),idade=v('idade');

 // Correção: evitar divisão por zero
 if(altura <= 0){
  alert('Informe altura válida');
  return;
 }
 let sexo=document.getElementById('sexo').value;

 // IMC
 let imc=peso/(altura*altura);
 let imcClass=classIMC(imc);
 // média da faixa ideal
let faixa = ideal.split('–');
let gorduraIdealMedia = (parseFloat(faixa[0]) + parseFloat(faixa[1]))/2;
let pesoIdealCalc = pesoIdeal(peso, gordura, gorduraIdealMedia);

 // JP7 (18–61 anos)
 let soma=v('triceps')+v('subescapular')+v('supra')+v('peitoral')+v('axilar')+v('abdomen')+v('coxa');
 let dens= sexo==='M'
  ?1.112-(0.00043499*soma)+(0.00000055*soma*soma)-(0.00028826*idade)
  :1.097-(0.00046971*soma)+(0.00000056*soma*soma)-(0.00012828*idade);
 let gordura=(495/dens)-450;
 let classG=classGordura(gordura,sexo);
 let ideal=idealGordura(sexo,idade);

 // Componentes de peso
 let pesoGordura=peso*(gordura/100);
 let pesoMagro=peso-pesoGordura;
 let pesoOsseo=peso*0.15;
 let pesoResidual=peso*0.10;
 let pesoMuscular=pesoMagro - pesoOsseo - pesoResidual;

 // Histórico
 hist.push(gordura);
 localStorage.setItem('hist',JSON.stringify(hist));

 // Análise de peso ideal
let pesoMin = pesoIdealCalc * 0.9;
let pesoMax = pesoIdealCalc * 1.1;
let diferenca = peso - pesoIdealCalc;
let ajuste = diferenca > 0 ? `Reduzir ${Math.abs(diferenca).toFixed(2)} kg` : `Ganhar ${Math.abs(diferenca).toFixed(2)} kg`;
let adequacao = (peso / pesoIdealCalc) * 100;
let recomendacao = '';

if(adequacao < 90){
 recomendacao = 'Abaixo do ideal: foco em ganho de massa e fortalecimento';
}else if(adequacao <= 110){
 recomendacao = 'Dentro do ideal: manter e otimizar composição corporal';
}else{
 recomendacao = 'Acima do ideal: foco em redução de gordura e condicionamento';
}

// Saída
 let res=`IMC: ${imc.toFixed(2)} (${imcClass})
`+
 `Peso ideal estimado (baseado na gordura ideal): ${pesoIdealCalc.toFixed(2)} kg
`+
 `Peso ideal estimado: ${pesoIdealCalc.toFixed(2)} kg\n`+
 `Gordura (JP7): ${gordura.toFixed(2)}% (${classG})\n`+
 `Faixa ideal: ${ideal}\n`+
 `Peso total: ${peso.toFixed(2)} kg\n`+
 `Peso gordura: ${pesoGordura.toFixed(2)} kg\n`+
 `Peso muscular: ${pesoMuscular.toFixed(2)} kg\n`+
 `Peso ósseo: ${pesoOsseo.toFixed(2)} kg\n`+
 `Peso residual: ${pesoResidual.toFixed(2)} kg`;
 res += `
Faixa de peso ideal: ${pesoMin.toFixed(2)} kg - ${pesoMax.toFixed(2)} kg`+
`
Ajuste necessário: ${ajuste}`+
`
Adequação ao ideal: ${adequacao.toFixed(1)}%`+
`
Recomendação: ${recomendacao}`;

document.getElementById('resultado').innerText=res;

 // Gráfico linha (evolução)
 new Chart(document.getElementById('graficoLinha'),{
  type:'line',
  data:{labels:hist.map((_,i)=>i+1),datasets:[{label:'% Gordura',data:hist}]}
 });

 // Gráfico colunas com cores
 new Chart(document.getElementById('graficoColuna'),{
  options:{
    plugins:{
      tooltip:{enabled:true},
      legend:{display:true}
    }
  },
  plugins:[{
    id:'labelsTopo',
    afterDatasetsDraw(chart){
      const {ctx} = chart;
      chart.data.datasets.forEach((dataset,i)=>{
        const meta = chart.getDatasetMeta(i);
        meta.data.forEach((bar,index)=>{
          const value = dataset.data[index];
          ctx.fillStyle = '#000';
          ctx.font = '12px Arial';
          ctx.textAlign = 'center';
          ctx.fillText(value.toFixed(1), bar.x, bar.y - 5);
        });
      });
    }
  }],
  type:'bar',
  data:{
    labels:['Total','Gordura','Muscular','Ósseo','Residual'],
    datasets:[{
      label:'Composição (kg)',
      data:[peso,pesoGordura,pesoMuscular,pesoOsseo,pesoResidual],
      backgroundColor:['#a78bfa','#ef4444','#22c55e','#3b82f6','#f59e0b']
    }]
  }
 });
}
</script>
</body>
</html>
